<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBA官方网站</title>
    <style>
        /* --- 样式部分保持不变 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 30px; }
        h1 { font-size: 28px; color: #fff; }
        .auth-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid #333; background: transparent; color: #aaa; cursor: pointer; font-size: 14px; transition: all 0.2s;}
        .auth-btn:hover { border-color: #fff; color: #fff; }
        .auth-btn.active { border-color: #4a9eff; color: #4a9eff; }
        .add-form { display: flex; gap: 10px; max-width: 1000px; margin: 0 auto 30px; }
        .add-form input { flex: 1; padding: 12px 16px; border: 1px solid #333; border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 15px; outline: none; min-width: 0;}
        .add-form input:focus { border-color: #4a9eff; }
        .add-form button { padding: 12px 24px; border: none; border-radius: 8px; background: #4a9eff; color: #fff; font-size: 15px; cursor: pointer; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1000px; margin: 0 auto; }
        .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; position: relative; transition: border-color 0.2s; }
        .card:hover { border-color: #4a9eff; }
        .card a { text-decoration: none; color: #e0e0e0; font-size: 16px; word-break: break-all; display: block; }
        .card .url { font-size: 12px; color: #666; margin-top: 8px; word-break: break-all; }
        .card .del { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #555; font-size: 18px; cursor: pointer; }
        .card .del:hover { color: #ff4444; }
        .empty { text-align: center; color: #555; margin-top: 60px; font-size: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HBA官方网站</h1>
        <!-- 登录/登出按钮 -->
        <button class="auth-btn" id="authBtn" onclick="toggleAuth()">管理员登录</button>
    </div>
    
    <!-- 管理员专属表单 -->
    <div class="add-form hidden" id="addForm">
        <input type="text" id="nameInput" placeholder="名称（可选）">
        <input type="text" id="urlInput" placeholder="粘贴网址，回车或点添加">
        <button onclick="addLink()">添加</button>
    </div>
    
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">暂无网址</div>

    <script>
        // 1. 配置部分：请替换为你自己的 Supabase 信息
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // 例如：https://abc.def.supabase.co
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // 以 ey... 开头的密钥
        
        // 2. 预设的默认数据（访客看到的，或者云端没数据时的备用数据）
        const DEFAULT_LINKS = [
            { name: "百度", url: "https://www.baidu.com" },
            { name: "谷歌", url: "https://www.google.com" }
        ];

        // 3. 状态变量
        let isAdmin = false;

        // 4. 检查登录状态
        function checkAuth() {
            if (localStorage.getItem('isAdmin') === 'true') {
                isAdmin = true;
                updateUI();
                loadFromCloud(); // 管理员加载云端数据
            } else {
                // 访客直接加载默认数据
                render(DEFAULT_LINKS);
            }
        }

        // 5. 从云端加载数据
        async function loadFromCloud() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/links`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                const data = await response.json();
                render(data);
            } catch (err) {
                alert("无法连接云端，正在使用默认列表");
                render(DEFAULT_LINKS);
            }
        }

        // 6. 保存到云端
        async function saveToCloud(item) {
            await fetch(`${SUPABASE_URL}/rest/v1/links`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                },
                body: JSON.stringify(item)
            });
            loadFromCloud(); // 保存后刷新列表
        }

        // 7. 删除云端数据
        async function delFromCloud(id) {
            await fetch(`${SUPABASE_URL}/rest/v1/links?id=eq.${id}`, {
                method: 'DELETE',
                headers: { 'apikey': SUPABASE_KEY }
            });
            loadFromCloud(); // 删除后刷新列表
        }

        // 8. 渲染列表
        function render(list) {
            const grid = document.getElementById('grid');
            const empty = document.getElementById('empty');
            grid.innerHTML = '';
            empty.style.display = list.length ? 'none' : 'block';
            
            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="${item.url}" target="_blank" rel="noopener">${item.name || item.url}</a>
                    ${item.name ? `<div class="url">${item.url}</div>` : ''}
                    ${isAdmin ? `<button class="del" onclick="delLink(${item.id})">×</button>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // 9. 切换登录/登出
        function toggleAuth() {
            if (isAdmin) {
                isAdmin = false;
                localStorage.removeItem('isAdmin');
                updateUI();
                render(DEFAULT_LINKS); // 退出后显示默认列表
            } else {
                const pwd = prompt("请输入管理员密码：");
                if (pwd === '20260331') { // 你的密码
                    isAdmin = true;
                    localStorage.setItem('isAdmin', 'true');
                    updateUI();
                    loadFromCloud(); // 登录后加载云端数据
                } else if (pwd !== null) {
                    alert("密码错误！");
                }
            }
        }

        // 10. 添加链接
        function addLink() {
            const urlEl = document.getElementById('urlInput');
            const nameEl = document.getElementById('nameInput');
            let url = urlEl.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            
            const newItem = {
                name: nameEl.value.trim(),
                url: url
            };
            
            saveToCloud(newItem);
            urlEl.value = '';
            nameEl.value = '';
        }

        // 11. 删除链接
        function delLink(id) {
            if (confirm("确定删除？")) {
                delFromCloud(id);
            }
        }

        // 12. 更新界面
        function updateUI() {
            const btn = document.getElementById('authBtn');
            const form = document.getElementById('addForm');
            if (isAdmin) {
                btn.textContent = "退出管理";
                btn.classList.add('active');
                form.classList.remove('hidden');
            } else {
                btn.textContent = "管理员登录";
                btn.classList.remove('active');
                form.classList.add('hidden');
            }
        }

        // 页面加载初始化
        checkAuth();
    </script>
</body>
</html>
