<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBA官方网站</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f; 
    color: #e0e0e0; 
    min-height: 100vh; 
    padding: 20px; 
}
.header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    max-width: 1000px; 
    margin: 0 auto 20px; 
}
h1 { font-size: 24px; color: #fff; }
.time-display {
    font-size: 14px;
    color: #aaa;
    background: #1a1a1a;
    padding: 6px 12px;
    border-radius: 6px;
}
.auth-btn { 
    padding: 8px 16px; 
    border-radius: 6px; 
    border: 1px solid #333; 
    background: transparent; 
    color: #aaa; 
    cursor: pointer; 
    font-size: 14px; 
    transition: all 0.2s;
}
.auth-btn:hover { border-color: #fff; color: #fff; }
.auth-btn.active { border-color: #4a9eff; color: #4a9eff; }
.add-form { 
    display: flex; 
    gap: 10px; 
    max-width: 1000px; 
    margin: 0 auto 30px; 
}
.add-form input { 
    flex: 1; 
    padding: 12px 16px; 
    border: 1px solid #333; 
    border-radius: 8px; 
    background: #1a1a1a; 
    color: #fff; 
    font-size: 15px; 
    outline: none; 
    min-width: 0;
}
.add-form input:focus { border-color: #4a9eff; }
.add-form button { 
    padding: 12px 24px; 
    border: none; 
    border-radius: 8px; 
    background: #4a9eff; 
    color: #fff; 
    font-size: 15px; 
    cursor: pointer; 
    white-space: nowrap; 
    transition: background 0.2s;
}
.add-form button:hover {
    background: #3a8eef;
}
.add-form button:active {
    background: #2a7edf;
}
.grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 16px; 
    max-width: 1000px; 
    margin: 0 auto; 
}
.card { 
    background: #1a1a1a; 
    border: 1px solid #2a2a2a; 
    border-radius: 12px; 
    padding: 20px; 
    position: relative; 
    transition: transform 0.2s, border-color 0.2s; 
    cursor: pointer;
}
.card:hover { 
    border-color: #4a9eff; 
    transform: translateY(-2px);
}
.card a { 
    text-decoration: none; 
    color: #e0e0e0; 
    font-size: 16px; 
    display: block; 
    font-weight: 500;
    transition: color 0.2s;
}
.card a:hover {
    color: #4a9eff;
}
.card .url { 
    font-size: 12px; 
    color: #666; 
    margin-top: 8px; 
    word-break: break-all;
}
.card .del { 
    position: absolute; 
    top: 10px; 
    right: 12px; 
    background: none; 
    border: none; 
    color: #555; 
    font-size: 18px; 
    cursor: pointer; 
    transition: color 0.2s;
}
.card .del:hover { color: #ff4444; }
.empty { text-align: center; color: #555; margin-top: 60px; font-size: 16px; }
.hidden { display: none !important; }
.success-msg {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #4a9eff;
    color: #fff;
    padding: 12px 16px;
    border-radius: 6px;
    display: none;
    z-index: 1000;
    animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
.success-msg.show {
    display: block;
}
</style>
</head>
<body>

<div class="header">
    <h1>HBA官方网站</h1>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span class="time-display" id="current-time">加载中...</span>
        <button class="auth-btn" id="authBtn" onclick="toggleAuth()">管理员登录</button>
    </div>
</div>

<div class="add-form hidden" id="addForm">
    <input type="text" id="nameInput" placeholder="名称（可选）">
    <input type="text" id="urlInput" placeholder="粘贴网址，回车或点添加" onkeypress="handleKeyPress(event)">
    <button onclick="addLink()">添加</button>
</div>

<div class="success-msg" id="successMsg">✓ 链接已添加</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty">暂无网址</div>

<script>
const DEFAULT_LINKS = [
    { id: 1, name: "百度", url: "https://www.baidu.com" },
    { id: 2, name: "谷歌", url: "https://www.google.com" }
];

let isAdmin = false;
let links = [];
let nextId = 3;

function updateTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const weekday = weekdays[now.getDay()];

    document.getElementById('current-time').textContent = 
        `${year}-${month}-${day} ${weekday} ${hours}:${minutes}:${seconds}`;
}

window.onload = function() {
    updateTime();
    setInterval(updateTime, 1000);
    loadLinks();
    checkAuth();
};

function loadLinks() {
    const stored = localStorage.getItem('hba_links');
    const storedId = localStorage.getItem('hba_nextId');
    
    if (stored) {
        links = JSON.parse(stored);
    } else {
        links = JSON.parse(JSON.stringify(DEFAULT_LINKS));
    }
    
    if (storedId) {
        nextId = parseInt(storedId);
    }
    
    render();
}

function saveLinks() {
    localStorage.setItem('hba_links', JSON.stringify(links));
    localStorage.setItem('hba_nextId', nextId.toString());
}

function checkAuth() {
    if (localStorage.getItem('isAdmin') === 'true') {
        isAdmin = true;
        updateUI();
    } else {
        isAdmin = false;
        updateUI();
    }
}

function render() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    empty.style.display = links.length ? 'none' : 'block';
    
    links.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <a href="${item.url}" target="_blank" rel="noopener">${item.name || item.url}</a>
            ${item.name ? `<div class="url">${item.url}</div>` : ''}
            ${isAdmin ? `<button class="del" onclick="delLink(${item.id})">×</button>` : ''}
        `;
        grid.appendChild(card);
    });
}

function toggleAuth() {
    if (isAdmin) {
        isAdmin = false;
        localStorage.removeItem('isAdmin');
        updateUI();
        render();
    } else {
        const pwd = prompt("请输入管理员密码：");
        if (pwd === '20260331') {
            isAdmin = true;
            localStorage.setItem('isAdmin', 'true');
            updateUI();
            render();
        } else if (pwd !== null) {
            alert("密码错误！");
        }
    }
}

function handleKeyPress(event) {
    if (event.key === 'Enter') {
        addLink();
    }
}

function addLink() {
    const urlEl = document.getElementById('urlInput');
    const nameEl = document.getElementById('nameInput');
    let url = urlEl.value.trim();
    
    if (!url) {
        alert('请输入网址');
        return;
    }
    
    if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
    }
    
    const newItem = {
        id: nextId++,
        name: nameEl.value.trim(),
        url: url
    };
    
    links.push(newItem);
    saveLinks();
    render();
    
    urlEl.value = '';
    nameEl.value = '';
    urlEl.focus();
    
    showSuccessMsg();
}

function delLink(id) {
    if (confirm("确定删除？")) {
        links = links.filter(item => item.id !== id);
        saveLinks();
        render();
    }
}

function showSuccessMsg() {
    const msg = document.getElementById('successMsg');
    msg.classList.add('show');
    setTimeout(() => {
        msg.classList.remove('show');
    }, 2000);
}

function updateUI() {
    const btn = document.getElementById('authBtn');
    const form = document.getElementById('addForm');
    if (isAdmin) {
        btn.textContent = "退出管理";
        btn.classList.add('active');
        form.classList.remove('hidden');
    } else {
        btn.textContent = "管理员登录";
        btn.classList.remove('active');
        form.classList.add('hidden');
    }
}
</script>
</body>
</html>
